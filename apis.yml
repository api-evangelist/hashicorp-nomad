    name: HashiCorp Nomad
    description: >-
      HashiCorp Nomad is a flexible workload orchestrator that deploys and
      manages containers, legacy applications, microservices, and batch jobs.
      It supports Docker, Java, VMs, and executables with a single binary
      architecture that provides high availability, multi-datacenter
      federation, and a simple operator experience.
