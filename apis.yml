aid: hashicorp-nomad
name: HashiCorp Nomad
description: >-
  HashiCorp Nomad is a flexible workload orchestrator that enables organizations
  to deploy and manage containers, non-containerized applications, and batch
  jobs across on-premises and cloud environments. It provides a single unified
  workflow for scheduling diverse workloads with high availability and
  multi-region federation.
